<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTopik Admin - Kirish</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link rel="icon" href="data:,">
</head>
<body>
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="logo">
      <h2><span class="text-primary">iTopik</span> Admin</h2>
      <p>Admin panelga kirish</p>
    </div>
    <form id="loginForm" autocomplete="off">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="loginUsername" class="form-control form-control-lg" placeholder="Username" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-control form-control-lg" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100">
        <span id="loginBtnText">Kirish</span>
        <span id="loginBtnSpinner" class="spinner-border spinner-border-sm d-none"></span>
      </button>
    </form>
    <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
